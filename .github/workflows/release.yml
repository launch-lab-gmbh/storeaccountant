name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:

  ################################
  # Validate version constraints #
  ################################

  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Validate plugin versions against Git tag
        shell: bash
        run: |
          set -u -o pipefail

          EXPECTED_VERSION="${GITHUB_REF_NAME}"

          errors=()

          add_error() {
            local message="$1"
            errors+=("$message")
            echo "::error::$message"
          }

          check_equals() {
            local label="$1"
            local actual="$2"

            if [[ -z "$actual" ]]; then
              add_error "$label was not found. Expected: $EXPECTED_VERSION"
            elif [[ "$actual" != "$EXPECTED_VERSION" ]]; then
              add_error "$label is '$actual', expected '$EXPECTED_VERSION'"
            else
              echo "OK: $label = $actual"
            fi
          }

          echo "Validating plugin versions against Git tag: $EXPECTED_VERSION"

          #
          # 1. readme.txt - Stable tag
          #
          if [[ ! -f "readme.txt" ]]; then
            add_error "readme.txt was not found."
          else
            README_STABLE_TAG="$(
              grep -m1 -E '^[[:space:]]*Stable tag:[[:space:]]*' readme.txt \
                | sed -E 's/^[[:space:]]*Stable tag:[[:space:]]*//; s/[[:space:]]+$//' \
                || true
            )"

            check_equals "readme.txt Stable tag" "$README_STABLE_TAG"
          fi

          #
          # 2. storeaccountant.php - WordPress plugin header version
          #
          if [[ ! -f "storeaccountant.php" ]]; then
            add_error "storeaccountant.php was not found."
          else
            PLUGIN_HEADER_VERSION="$(
              grep -m1 -E '^[[:space:]]*\*?[[:space:]]*Version:[[:space:]]*' storeaccountant.php \
                | sed -E 's/^[[:space:]]*\*?[[:space:]]*Version:[[:space:]]*//; s/[[:space:]]+$//' \
                || true
            )"

            check_equals "storeaccountant.php plugin header Version" "$PLUGIN_HEADER_VERSION"

            #
            # 2.1 storeaccountant.php - public const PLUGIN_VERSION
            #
            PLUGIN_CONST_VERSION="$(
              sed -nE "s/^[[:space:]]*public[[:space:]]+const[[:space:]]+PLUGIN_VERSION[[:space:]]*=[[:space:]]*['\"]([^'\"]+)['\"][[:space:]]*;.*/\1/p" storeaccountant.php \
                | head -n1 \
                || true
            )"

            check_equals "storeaccountant.php public const PLUGIN_VERSION" "$PLUGIN_CONST_VERSION"
          fi

          #
          # Fail at the end with a collected error summary
          #
          if (( ${#errors[@]} > 0 )); then
            {
              echo "## Release version validation failed"
              echo ""
              echo "Expected version from Git tag: \`$EXPECTED_VERSION\`"
              echo ""
              echo "### Errors"
              for error in "${errors[@]}"; do
                echo "- $error"
              done
            } >> "$GITHUB_STEP_SUMMARY"

            echo ""
            echo "Release version validation failed:"
            for error in "${errors[@]}"; do
              echo "- $error"
            done

            exit 1
          fi

          {
            echo "## Release version validation passed :rocket:"
            echo ""
            echo "All checked versions match: \`$EXPECTED_VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Release version validation passed. All versions match $EXPECTED_VERSION."

  #####################
  # QA and Unit tests #
  #####################

  dev-install:
    name: Install Composer development dependencies
    uses: ./.github/workflows/reusable-composer.yml
    needs: validate-version
    with:
      artifact_name: vendor-dev-php82

  production-install:
    name: Install Composer production dependencies
    uses: ./.github/workflows/reusable-composer.yml
    needs: validate-version
    with:
      production: true
      artifact_name: vendor-prod-php82

  lint:
    name: PHP code linting
    needs: dev-install
    uses: ./.github/workflows/reusable-lint.yml
    with:
      artifact_name: vendor-dev-php82

  unit:
    name: PHP unit tests
    needs: dev-install
    uses: ./.github/workflows/reusable-unit.yml
    with:
      artifact_name: vendor-dev-php82

  ###################################
  # Build and deploy documentations #
  ###################################

  build-docs:
    name: Build and deploy HTML documentation
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit

    env:
      DOCS_USER_DE_DIR: site-user-de
      DOCS_USER_EN_DIR: site-user-en
      DOCS_DEVELOPER_DIR: site-developer

    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check documentation changes
        id: docs-changes
        shell: bash
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(
            git describe \
              --tags \
              --abbrev=0 \
              "HEAD^" 2>/dev/null \
              || true
          )"

          DOCS_CHANGED=false

          if [[ -z "$PREVIOUS_TAG" ]]; then
            DOCS_CHANGED=true
            echo "No previous tag found. Documentation deployment will run."
          else
            echo "Checking documentation changes since ${PREVIOUS_TAG}."

            while IFS= read -r path; do
              case "$path" in
                docs/user/*|docs/developer/*|mkdocs-user-*.yml|mkdocs-developer.yml|requirements-docs.txt)
                  DOCS_CHANGED=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "${PREVIOUS_TAG}..HEAD")
          fi

          echo "changed=${DOCS_CHANGED}" >> "$GITHUB_OUTPUT"

          if [[ "$DOCS_CHANGED" == "true" ]]; then
            echo "Documentation deployment enabled."
          else
            echo "Documentation deployment skipped; no documentation changes detected."
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build German user documentation
        run: |
          mkdocs build \
            --config-file mkdocs-user-de.yml \
            --site-dir "${DOCS_USER_DE_DIR}"

      - name: Build English user documentation
        run: |
          mkdocs build \
            --config-file mkdocs-user-en.yml \
            --site-dir "${DOCS_USER_EN_DIR}"

      - name: Build developer documentation
        run: |
          mkdocs build \
            --config-file mkdocs-developer.yml \
            --site-dir "${DOCS_DEVELOPER_DIR}"

      - name: Prepare documentation deploy directories
        run: |
          rm -rf deploy-docs
          mkdir -p deploy-docs/user-de
          mkdir -p deploy-docs/user-en
          mkdir -p deploy-docs/developer

          rsync -a --delete "${DOCS_USER_DE_DIR}/" deploy-docs/user-de/
          rsync -a --delete "${DOCS_USER_EN_DIR}/" deploy-docs/user-en/
          rsync -a --delete "${DOCS_DEVELOPER_DIR}/" deploy-docs/developer/

      - name: Deploy German user documentation via SFTP
        if: ${{ steps.docs-changes.outputs.changed == 'true' }}
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/user-de
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_USER_DE }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Deploy English user documentation via SFTP
        if: ${{ steps.docs-changes.outputs.changed == 'true' }}
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/user-en
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_USER_EN }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Deploy developer documentation via SFTP
        if: ${{ steps.docs-changes.outputs.changed == 'true' }}
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/developer
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_DEVELOPER }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Create documentation ZIP archives
        run: |
          rm -rf documentation-user-archive
          mkdir -p documentation-user-archive/de/anleitungen
          mkdir -p documentation-user-archive/en/documentation

          rsync -a --delete deploy-docs/user-de/ documentation-user-archive/de/anleitungen/
          rsync -a --delete deploy-docs/user-en/ documentation-user-archive/en/documentation/

          cd documentation-user-archive
          zip -r "../storeaccountant-documentation-user.zip" .

          cd "../${DOCS_DEVELOPER_DIR}"
          zip -r "../storeaccountant-documentation-developer.zip" .

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v6
        with:
          name: storeaccountant-docs
          path: |
            storeaccountant-documentation-user.zip
            storeaccountant-documentation-developer.zip
          retention-days: 30

  #########################
  # Build release package #
  #########################

  build-release:
    name: Build GitHub Release
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit
      - production-install
      - build-docs

    env:
      PLUGIN_SLUG: storeaccountant
      MAIN_PLUGIN_FILE: storeaccountant.php
      PHP_VERSION: '8.2'

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: zip
          tools: composer:v2
          coverage: none

      - name: Install dependency prefixing tools
        run: composer install --working-dir=tools/php-scoper --no-interaction --prefer-dist --no-progress

      - name: Download production vendor
        uses: actions/download-artifact@v8
        with:
          name: vendor-prod-php82
          path: vendor

      - name: Prepare release package
        run: |
          VERSION="${GITHUB_REF_NAME}"

          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"

          cp "${MAIN_PLUGIN_FILE}" "build/${PLUGIN_SLUG}/"
          cp uninstall.php "build/${PLUGIN_SLUG}/"
          cp readme.txt composer.json LICENSE "build/${PLUGIN_SLUG}/"

          cp -R src "build/${PLUGIN_SLUG}/"
          cp -R assets "build/${PLUGIN_SLUG}/"
          cp -R vendor "build/${PLUGIN_SLUG}/"
          cp -R languages "build/${PLUGIN_SLUG}/"

          find "build/${PLUGIN_SLUG}/vendor" -type d \( \
            -name ".git" -o \
            -name ".github" -o \
            -name "test" -o \
            -name "tests" -o \
            -name "Tests" -o \
            -name "docs" -o \
            -name "doc" -o \
            -name "examples" -o \
            -name "example" -o \
            -name "demo" \
            \) -prune -exec rm -rf {} +

          find "build/${PLUGIN_SLUG}/vendor" -type f \( \
            -name ".gitignore" -o \
            -name ".gitattributes" -o \
            -name "phpunit.xml" -o \
            -name "phpunit.xml.dist" -o \
            -name "phpstan.neon" -o \
            -name "psalm.xml" -o \
            -name "composer.lock" -o \
            -name "LICENSE-for-cc42c1d" \
            \) -delete

      - name: Prefix release dependencies
        run: |
          rm -rf "build/${PLUGIN_SLUG}-scoped"

          STOREACCOUNTANT_SCOPER_BUILD_DIR="${PWD}/build/${PLUGIN_SLUG}" \
            tools/php-scoper/vendor/bin/php-scoper add-prefix \
            --config=scoper.inc.php \
            --force

          php <<'PHP'
          <?php
          $pluginSlug = getenv( 'PLUGIN_SLUG' ) ?: 'storeaccountant';
          $autoloadFile = getcwd() . '/build/' . $pluginSlug . '-scoped/vendor/scoper-autoload.php';
          $contents = file_get_contents( $autoloadFile );

          if ( false === $contents ) {
            fwrite( STDERR, "Unable to read {$autoloadFile}.\n" );
            exit( 1 );
          }

          $updatedContents = preg_replace(
            '/\n\/\/ Class aliases\..*?\n(?=\/\/ Function aliases\.)/s',
            "\n",
            $contents,
            1,
            $replacementCount
          );

          if ( null === $updatedContents ) {
            fwrite( STDERR, "Unable to remove PHP-Scoper class aliases.\n" );
            exit( 1 );
          }

          if ( 0 === $replacementCount ) {
            fwrite( STDERR, "PHP-Scoper class aliases section was not found.\n" );
            exit( 1 );
          }

          file_put_contents( $autoloadFile, $updatedContents );
          PHP

          rm -rf "build/${PLUGIN_SLUG}"
          mv "build/${PLUGIN_SLUG}-scoped" "build/${PLUGIN_SLUG}"

          composer dump-autoload \
            --working-dir="build/${PLUGIN_SLUG}" \
            --no-dev \
            --optimize \
            --classmap-authoritative

      - name: Create ZIP archive
        run: |
          cd build
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: build/${{ env.PLUGIN_SLUG }}.zip
          retention-days: 30

      - name: Download documentation artifacts
        uses: actions/download-artifact@v8
        with:
          name: storeaccountant-docs
          path: build/docs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: StoreAccountant ${{ github.ref_name }}
          files: |
            build/${{ env.PLUGIN_SLUG }}.zip
            build/docs/storeaccountant-documentation-user.zip
            build/docs/storeaccountant-documentation-developer.zip
          generate_release_notes: true

  ###########################
  # Deploy to WordPress.org #
  ###########################

  wordpress-org-deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    needs:
      - build-release

    env:
      PLUGIN_SLUG: storeaccountant
      MAIN_PLUGIN_FILE: storeaccountant.php

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Install SVN tools
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync unzip

      - name: Download release package artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: build/artifact

      - name: Extract release package
        run: |
          rm -rf build/release
          mkdir -p build/release

          unzip "build/artifact/${PLUGIN_SLUG}.zip" -d build/release

          test -f "build/release/${PLUGIN_SLUG}/${MAIN_PLUGIN_FILE}"
          test -f "build/release/${PLUGIN_SLUG}/readme.txt"
          test -f "build/release/${PLUGIN_SLUG}/vendor/autoload.php"
          test -f "build/release/${PLUGIN_SLUG}/vendor/scoper-autoload.php"

      - name: Checkout WordPress.org SVN
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
        run: |
          svn checkout \
            --depth immediates \
            "https://plugins.svn.wordpress.org/${PLUGIN_SLUG}" \
            svn \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert

          cd svn

          svn update \
            --set-depth infinity \
            trunk \
            assets \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert

      - name: Sync trunk files
        run: |
          rsync -av --delete \
            "build/release/${PLUGIN_SLUG}/" \
            svn/trunk/

      - name: Sync WordPress.org assets
        run: |
          mkdir -p svn/assets

          if [[ -d ".wordpress-org" ]]; then
            rsync -av --delete \
              .wordpress-org/ \
              svn/assets/
          else
            echo ".wordpress-org directory not found. Skipping WordPress.org assets sync."
          fi

      - name: Commit trunk and assets
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          cd svn

          echo "Adding new trunk/assets files..."
          svn add --force trunk assets --auto-props --parents --depth infinity -q || true

          echo "Setting asset mime types..."
          find assets -type f -name '*.png' -exec svn propset svn:mime-type image/png {} +
          find assets -type f \( -name '*.jpg' -o -name '*.jpeg' \) -exec svn propset svn:mime-type image/jpeg {} +

          echo "Removing deleted files from SVN..."
          svn status trunk assets | awk '$1 == "!" {print substr($0, 9)}' | while IFS= read -r path; do
            svn rm "$path"
          done

          echo "SVN status before commit:"
          svn status trunk assets

          if svn status trunk assets | grep -q '^[AMDR?!~]'; then
            echo "Starting SVN commit for trunk/assets..."
            svn commit trunk assets \
              -m "Update trunk and assets for ${VERSION}" \
              --username "$SVN_USERNAME" \
              --password "$SVN_PASSWORD" \
              --non-interactive \
              --trust-server-cert
            echo "SVN trunk/assets commit finished."
          else
            echo "No trunk/assets changes to commit."
          fi

      - name: Create SVN tag
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          TRUNK_URL="https://plugins.svn.wordpress.org/${PLUGIN_SLUG}/trunk"
          TAG_URL="https://plugins.svn.wordpress.org/${PLUGIN_SLUG}/tags/${VERSION}"

          echo "Checking whether SVN tag already exists: ${TAG_URL}"

          if svn info "$TAG_URL" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert >/dev/null 2>&1; then
            echo "::error::SVN tag ${VERSION} already exists. WordPress.org tags should not be overwritten."
            exit 1
          fi

          echo "Creating SVN tag ${VERSION} from trunk..."

          svn copy \
            "$TRUNK_URL" \
            "$TAG_URL" \
            -m "Tag ${VERSION}" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert

          echo "SVN tag ${VERSION} created."
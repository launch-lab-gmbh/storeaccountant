name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:

  #####################
  # QA and Unit tests #
  #####################

  dev-install:
    name: Install Composer development dependencies
    uses: ./.github/workflows/reusable-composer.yml
    with:
      artifact_name: vendor-dev-php82

  production-install:
    name: Install Composer production dependencies
    uses: ./.github/workflows/reusable-composer.yml
    with:
      production: true
      artifact_name: vendor-prod-php82

  lint:
    name: PHP code linting
    needs: dev-install
    uses: ./.github/workflows/reusable-lint.yml
    with:
      artifact_name: vendor-dev-php82

  unit:
    name: PHP unit tests
    needs: dev-install
    uses: ./.github/workflows/reusable-unit.yml
    with:
      artifact_name: vendor-dev-php82

  ###################################
  # Build and deploy documentations #
  ###################################

  build-docs:
    name: Build HTML documentation
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit

    env:
      DOCS_USER_DIR: site-user
      DOCS_DEVELOPER_DIR: site-developer

    steps:
      - name: Check out source code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build user documentation
        run: |
          mkdocs build \
            --config-file mkdocs-user.yml \
            --site-dir "${DOCS_USER_DIR}"

      - name: Build developer documentation
        run: |
          mkdocs build \
            --config-file mkdocs-developer.yml \
            --site-dir "${DOCS_DEVELOPER_DIR}"

      - name: Prepare documentation deploy directories
        run: |
          rm -rf deploy-docs
          mkdir -p deploy-docs/user-de
          mkdir -p deploy-docs/user-en
          mkdir -p deploy-docs/developer

          rsync -a --delete --exclude='en/' "${DOCS_USER_DIR}/" deploy-docs/user-de/
          rsync -a --delete "${DOCS_USER_DIR}/en/" deploy-docs/user-en/
          rsync -a --delete "${DOCS_DEVELOPER_DIR}/" deploy-docs/developer/

      - name: Deploy German user documentation via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/user-de
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_USER_DE }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Deploy English user documentation via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/user-en
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_USER_EN }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Deploy developer documentation via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: ./deploy-docs/developer
          remoteDir: ${{ secrets.SFTP_PATH_DOCUMENTATION_DEVELOPER }}
          reverse: true
          onlyNewer: true
          options: >-
            --delete
            --verbose

      - name: Create documentation ZIP archives
        run: |
          cd "${DOCS_USER_DIR}"
          zip -r "../storeaccountant-documentation-user.zip" .

          cd "../${DOCS_DEVELOPER_DIR}"
          zip -r "../storeaccountant-documentation-developer.zip" .

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storeaccountant-docs
          path: |
            storeaccountant-documentation-user.zip
            storeaccountant-documentation-developer.zip
          retention-days: 30

  #########################
  # Deploy documentations #
  #########################

  #########################
  # Build release package #
  #########################

  build-release:
    name: Build GitHub Release
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit
      - production-install
      - build-docs

    env:
      PLUGIN_SLUG: storeaccountant
      MAIN_PLUGIN_FILE: storeaccountant.php

    steps:
      - name: Check out source code
        uses: actions/checkout@v5

      - name: Download production vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-prod-php82
          path: vendor

      - name: Prepare release package
        run: |
          VERSION="${GITHUB_REF_NAME}"

          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"

          cp "${MAIN_PLUGIN_FILE}" "build/${PLUGIN_SLUG}/"
          cp readme.txt composer.json LICENSE "build/${PLUGIN_SLUG}/"

          cp -R src "build/${PLUGIN_SLUG}/"
          cp -R assets "build/${PLUGIN_SLUG}/"
          cp -R vendor "build/${PLUGIN_SLUG}/"
          cp -R languages "build/${PLUGIN_SLUG}/"

      - name: Create ZIP archive
        run: |
          cd build
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: build/${{ env.PLUGIN_SLUG }}.zip
          retention-days: 30

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: storeaccountant-docs
          path: build/docs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: StoreAccountant ${{ github.ref_name }}
          files: |
            build/${{ env.PLUGIN_SLUG }}.zip
            build/docs/storeaccountant-documentation-user.zip
            build/docs/storeaccountant-documentation-developer.zip
          generate_release_notes: true


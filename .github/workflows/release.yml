name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  install:
    uses: ./.github/workflows/reusable-composer.yml

  production-install:
    uses: ./.github/workflows/reusable-composer.yml
    with:
      production: true
      artifact-name: vendor-prod-php82

  lint:
    needs: install
    uses: ./.github/workflows/reusable-lint.yml

  unit:
    needs: install
    uses: ./.github/workflows/reusable-unit.yml

  build-release:
    name: Build GitHub Release
    runs-on: ubuntu-latest
    needs:
      - unit
      - production-install

    env:
      PLUGIN_SLUG: storeaccountant
      MAIN_PLUGIN_FILE: storeaccountant.php

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Download production vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-prod-php82
          path: vendor

      - name: Prepare release package
        run: |
          VERSION="${GITHUB_REF_NAME}"

          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"

          cp "${MAIN_PLUGIN_FILE}" "build/${PLUGIN_SLUG}/"
          cp readme.txt "build/${PLUGIN_SLUG}/"

          cp -R src "build/${PLUGIN_SLUG}/"
          cp -R assets "build/${PLUGIN_SLUG}/"
          cp -R vendor "build/${PLUGIN_SLUG}/"
          cp -R languages "build/${PLUGIN_SLUG}/"

      - name: Create ZIP archive
        run: |
          VERSION="${GITHUB_REF_NAME}"

          cd build
          zip -r "${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ github.ref_name }}
          path: build/${{ env.PLUGIN_SLUG }}-${{ github.ref_name }}.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.PLUGIN_SLUG }}-${{ github.ref_name }}.zip
          generate_release_notes: true


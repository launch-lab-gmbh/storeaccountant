name: Reusable Lint

on:
  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: vendor-php82

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: zip
          tools: composer:v2
          coverage: none

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: vendor

      - name: Verify vendor exists
        run: test -f vendor/autoload.php

      - name: Fix vendor binary permissions
        run: chmod +x vendor/bin/*

      - name: Run lint
        run: composer lint-ci
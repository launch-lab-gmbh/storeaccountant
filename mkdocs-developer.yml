site_name: StoreAccountant Developer Documentation
site_url: https://storeaccountant.launch-lab.de/en/documentation-developer/
docs_dir: docs/developer
site_description: Flexible accounting features for WooCommerce. Exports for orders and customers.
site_author: LaunchLab GmbH
site_dir: docs/dist/developer

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight

copyright: |
  © LaunchLab GmbH · StoreAccountant

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      locale: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/launch-lab-gmbh/storeaccountant
    - icon: fontawesome/solid/globe
      link: https://launch-lab.de
      name: LaunchLab Website
    - icon: fontawesome/solid/envelope
      link: mailto:storeaccountant@launch-lab.de
      name: Support
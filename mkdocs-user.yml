site_name: StoreAccountant Guide
site_author: LaunchLab GmbH
site_url: https://storeaccountant.launch-lab.de/de/anleitungen/
docs_dir: docs/user
site_dir: docs/dist/user

theme:
  name: material
  language: de
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight

copyright: |
  © LaunchLab GmbH · StoreAccountant

plugins:
  - search
  - awesome-pages
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          name: Deutsch
          build: true
          default: true
          site_name: StoreAccountant Anleitungen
          site_url: https://storeaccountant.launch-lab.de/de/anleitungen/
          fixed_link: /de/anleitungen/
        - locale: en
          name: English
          build: true
          site_url: https://storeaccountant.launch-lab.de/en/documentation/
          fixed_link: /en/documentation/
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      locale: de

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/launch-lab-gmbh/storeaccountant
    - icon: fontawesome/solid/globe
      link: https://launch-lab.de
      name: LaunchLab Website
    - icon: fontawesome/solid/envelope
      link: mailto:storeaccountant@launch-lab.de
      name: Support
